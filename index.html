<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Bookshelf</title>
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<style>
body { font-family: sans-serif; max-width: 600px; margin: auto; }
video { width: 100%; margin-top: 10px; }
button { margin-top: 5px; }
.book { border-bottom: 1px solid #ccc; padding: 8px 0; }
</style>
</head>

<body>
<h1>📚 My Bookshelf</h1>

<h2>スキャン</h2>
<video id="video"></video>
<div id="scanResult"></div>

<h2>保存</h2>
<label>ジャンル:
<select id="genre">
  <option>小説</option>
  <option>ミステリー</option>
  <option>ビジネス</option>
  <option>漫画</option>
  <option>技術書</option>
  <option>その他</option>
</select>
</label>
<br>
<label>メモ:
<input type="text" id="memo" placeholder="メモを書く">
</label>
<br>
<button onclick="saveBook()">保存</button>

<h2>検索</h2>
<input type="text" id="search" placeholder="タイトル検索" oninput="renderBooks()">

<h2>本棚</h2>
<div id="books"></div>

<script>
const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
const video = document.getElementById('video');
const scanResult = document.getElementById('scanResult');

let currentBook = null;

async function startScanner() {
    const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
    codeReader.decodeFromVideoDevice(devices[0].deviceId, video, async (result, err) => {
        if (result) {
            const isbn = result.text;
            codeReader.reset();

            const response = await fetch(
                "https://www.googleapis.com/books/v1/volumes?q=isbn:" + isbn
            );
            const data = await response.json();

            if (data.totalItems > 0) {
                const info = data.items[0].volumeInfo;
                currentBook = {
                    isbn: isbn,
                    title: info.title,
                    authors: (info.authors || ["不明"]).join(", ")
                };
                scanResult.innerText =
                    "タイトル: " + currentBook.title +
                    "\n著者: " + currentBook.authors;
            } else {
                scanResult.innerText = "本が見つかりません";
            }
        }
    });
}

function getBooks() {
    return JSON.parse(localStorage.getItem("books") || "[]");
}

function saveBook() {
    if (!currentBook) return;

    const books = getBooks();
    const genre = document.getElementById("genre").value;
    const memo = document.getElementById("memo").value;

    books.push({
        ...currentBook,
        genre: genre,
        memo: memo
    });

    localStorage.setItem("books", JSON.stringify(books));
    renderBooks();
    alert("保存しました！");
}

function renderBooks() {
    const booksDiv = document.getElementById("books");
    const search = document.getElementById("search").value.toLowerCase();
    const books = getBooks();

    booksDiv.innerHTML = "";

    books
    .filter(b => b.title.toLowerCase().includes(search))
    .forEach(book => {
        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML =
            "<strong>" + book.title + "</strong><br>" +
            "著者: " + book.authors + "<br>" +
            "ジャンル: " + book.genre + "<br>" +
            "メモ: " + book.memo;
        booksDiv.appendChild(div);
    });
}

startScanner();
renderBooks();
</script>
</body>
</html>
