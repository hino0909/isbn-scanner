<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Bookshelf</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  font-family: sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

video {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 8px;
  background: #000;
}

#result {
  margin-top: 10px;
  white-space: pre-line;
}

button {
  margin-top: 10px;
}

.book {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
}
</style>
</head>

<body>

<h1>📚 My Bookshelf</h1>

<h2>スキャン</h2>
<video id="video"></video>
<div id="result">カメラ起動中...</div>

<h2>保存</h2>
<label>ジャンル:
<select id="genre">
  <option>小説</option>
  <option>ミステリー</option>
  <option>ビジネス</option>
  <option>漫画</option>
  <option>技術書</option>
  <option>その他</option>
</select>
</label>
<br>
<label>メモ:
<input type="text" id="memo" placeholder="メモを書く">
</label>
<br>
<button onclick="saveBook()">保存</button>

<h2>検索</h2>
<input type="text" id="search" placeholder="タイトル検索" oninput="renderBooks()">

<h2>本棚</h2>
<div id="books"></div>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();
const video = document.getElementById("video");
const result = document.getElementById("result");

let currentBook = null;

async function start() {
  try {
    const devices = await codeReader.listVideoInputDevices();
    const deviceId = devices[0].deviceId;

    codeReader.decodeFromVideoDevice(deviceId, video, async (res, err) => {
      if (res) {

        const code = res.text;

        // ISBNのみ処理
        if (code.startsWith("978") || code.startsWith("979")) {

          result.textContent = "ISBN: " + code + "\n取得中...";
          codeReader.reset();

          try {
            const response = await fetch(
              "https://www.googleapis.com/books/v1/volumes?q=isbn:" + code
            );
            const data = await response.json();

            if (data.totalItems > 0) {
              const info = data.items[0].volumeInfo;

              currentBook = {
                isbn: code,
                title: info.title,
                authors: (info.authors || ["不明"]).join(", ")
              };

              result.textContent =
                "タイトル: " + currentBook.title +
                "\n著者: " + currentBook.authors;

            } else {
              result.textContent = "本が見つかりません";
            }

          } catch (e) {
            result.textContent = "取得エラー";
          }

        }
      }
    });

  } catch (e) {
    result.textContent = "カメラエラー: " + e;
  }
}

function getBooks() {
  return JSON.parse(localStorage.getItem("books") || "[]");
}

function saveBook() {
  if (!currentBook) {
    alert("先にスキャンしてください");
    return;
  }

  const books = getBooks();

  // 重複チェック
  if (books.some(b => b.isbn === currentBook.isbn)) {
    alert("この本はすでに登録されています");
    return;
  }

  const genre = document.getElementById("genre").value;
  const memo = document.getElementById("memo").value;

  books.push({
    ...currentBook,
    genre: genre,
    memo: memo
  });

  localStorage.setItem("books", JSON.stringify(books));
  renderBooks();
  alert("保存しました！");
}

function renderBooks() {
  const booksDiv = document.getElementById("books");
  const search = document.getElementById("search").value.toLowerCase();
  const books = getBooks();

  booksDiv.innerHTML = "";

  books
    .filter(b => b.title.toLowerCase().includes(search))
    .forEach(book => {
      const div = document.createElement("div");
      div.className = "book";
      div.innerHTML =
        "<strong>" + book.title + "</strong><br>" +
        "著者: " + book.authors + "<br>" +
        "ジャンル: " + book.genre + "<br>" +
        "メモ: " + book.memo;
      booksDiv.appendChild(div);
    });
}

start();
renderBooks();
</script>

</body>
</html>
