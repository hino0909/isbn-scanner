<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本棚管理</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  max-width: 600px;
  margin: auto;
  position: relative;
}

video {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 8px;
  background: black;
  position: relative;
}


button {
  margin: 5px 0;
  padding: 8px 12px;
}

input, textarea {
  width: 100%;
  margin: 5px 0;
  padding: 6px;
}

.book {
  border: 1px solid #ddd;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}

img {
  max-width: 100px;
}
</style>
</head>

<body>

<h2> 本棚管理</h2>

<div style="position: relative;">
  <video id="video"></video>
  <div id="overlay"></div>
</div>

<button onclick="startScan()">スキャン開始</button>

<h3>検索</h3>
<input type="text" id="search" placeholder="タイトル検索" oninput="renderBooks()">

<h3>登録一覧</h3>
<div id="bookList"></div>

<script>
let books = JSON.parse(localStorage.getItem("books") || "[]");
const codeReader = new ZXing.BrowserBarcodeReader();
let scanning = false;

async function startScan() {
  if (scanning) return;
  scanning = true;

  try {
    const videoInputDevices = await codeReader.listVideoInputDevices();
    if (videoInputDevices.length === 0) {
      alert("カメラが見つかりません");
      scanning = false;
      return;
    }

    const deviceId = videoInputDevices[0].deviceId;

    codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
      if (result) {
        const isbn = result.text;
        if (!isbn.startsWith("978") && !isbn.startsWith("979")) {
          alert("ISBNを読み取ってください");
          return;
        }
        fetchBookData(isbn);
      }
      if (err && !(err instanceof ZXing.NotFoundException)) {
        console.error(err);
      }
    });

  } catch (err) {
    alert("カメラが使えません");
    scanning = false;
  }
}

async function fetchBookData(isbn) {
 

  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    const data = await res.json();

    if (data.totalItems === 0) {
      alert("本が見つかりません");
      return;
    }

    const book = data.items[0].volumeInfo;

    const newBook = {
      id: Date.now(),
      isbn,
      title: book.title || "",
      authors: book.authors ? book.authors.join(", ") : "",
      publisher: book.publisher || "",
      thumbnail: book.imageLinks?.thumbnail || "",
      genre: "",
      memo: ""
    };

    books.push(newBook);
    saveBooks();
    renderBooks();

  } catch (err) {
    alert("本の情報を取得できませんでした");
    console.error(err);
  }
}

function saveBooks() {
  localStorage.setItem("books", JSON.stringify(books));
}

function renderBooks() {
  const list = document.getElementById("bookList");
  const keyword = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  books
    .filter(b => b.title.toLowerCase().includes(keyword))
    .forEach(book => {
      const div = document.createElement("div");
      div.className = "book";
      div.innerHTML = `
        ${book.thumbnail ? `<img src="${book.thumbnail}"><br>` : ""}
        <strong>${book.title}</strong><br>
        ${book.authors}<br>
        ${book.publisher}<br>
        <small>ISBN: ${book.isbn}</small><br>

        ジャンル:
        <input value="${book.genre}" onchange="updateBook(${book.id}, 'genre', this.value)">

        メモ:
        <textarea onchange="updateBook(${book.id}, 'memo', this.value)">${book.memo}</textarea>

        <button onclick="deleteBook(${book.id})">削除</button>
      `;
      list.appendChild(div);
    });
}

function updateBook(id, key, value) {
  const book = books.find(b => b.id === id);
  if (book) {
    book[key] = value;
    saveBooks();
  }
}

function deleteBook(id) {
  books = books.filter(b => b.id !== id);
  saveBooks();
  renderBooks();
}

renderBooks();
</script>

</body>
</html>
